[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/"
  to = "/home.html"
  status = 200

[[redirects]]
  from = "/api/listings"
  to = "/.netlify/functions/listings"
  status = 200

[[redirects]]
  from = "/api/youtube"
  to = "/.netlify/functions/youtube"
  status = 200